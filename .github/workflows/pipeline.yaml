name: Model CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

# Permisos necesarios para hacer commits y desplegar en Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  quality-and-testing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff ty pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Code Quality (Ruff Lint & Format)
        run: |
          ruff check .
          ruff format --check .

      - name: Type Checking (ty)
        run: ty .

      - name: Unit Tests (pytest)
        run: pytest tests/

  train-and-evaluate:
    needs: quality-and-testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Train Model
        run: python src/train.py # Asumiendo que este es el script original de entrenamiento
        
      - name: Evaluate Model (Accuracy, Precision, Recall >= 80%)
        run: python scripts/evaluate_model.py

      # Subimos las métricas como artefacto para el siguiente job
      - name: Upload Metrics Artifact
        uses: actions/upload-artifact@v3
        with:
          name: latest-metrics
          path: latest_metrics.json

  deploy-pages:
    needs: train-and-evaluate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Download Metrics Artifact
        uses: actions/download-artifact@v3
        with:
          name: latest-metrics

      - name: Update History and Generate HTML
        run: python scripts/update_history.py

      - name: Commit history.json to repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json
          # Solo hace el commit si hay cambios reales
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update model history"
          git push origin main

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: 'public/' # Carpeta generada por update_history.p

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2