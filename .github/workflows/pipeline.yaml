name: Model CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

# Permisos necesarios para hacer commits y desplegar en Pages
permissions:
  contents: write
  pages: write
  id-token: write


jobs:
  quality-and-testing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff ty pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Code Quality (Ruff Lint & Format)
        run: |
          ruff check .
          ruff format --check .

      - name: Type Checking (ty)
        run: ty check .

      - name: Unit Tests (pytest)
        run: PYTHONPATH=src pytest tests

  train-and-evaluate:
    needs: quality-and-testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv pip install -r pyproject.toml --system

      - name: Train Model
        run: |
          python -c "import sys; sys.path.append('src'); from revolutionary_mlops.ml import train; print(train())"

      - name: Evaluate Model (Accuracy, Precision, Recall >= 80%)
        run: |
          python -c "
          import sys
          import random
          sys.path.append('src')
          from revolutionary_mlops.metrics import compute_metrics

          # Generamos columna con salidas esperadas
          from pathlib import Path
          csv_path = Path("./data/validate.csv")
          validation_data = utils.load_csv(csv_path)
          validation_data_actual_values = [row[0] for row in validation_data]
          validation_data_input_values = [row[1:] for row in validation_data]
          model_id = "model_0.85"
          validation_data_predicted_values = [
              predict(model_id, *values) for values in validation_data_input_values
          ]
          
          # Cálculo de métricas
          metrics = compute_metrics(validation_data_actual_values, validation_data_predicted_values)

          # Extraemos valores para evitar problemas de f-strings con comillas
          acc = metrics['accuracy']
          pre = metrics['precision']
          rec = metrics['recall']

          print(f'Métricas obtenidas: Accuracy={acc:.2f}, Precision={pre:.2f}, Recall={rec:.2f}')

          if acc < 0.8 or pre < 0.8 or rec < 0.8:
              print('FALLO: Las métricas son inferiores al 80%')
              sys.exit(1)

          print('Todas las métricas superan el 80%. El modelo es válido.')
          "

      # Subimos las métricas como artefacto para el siguiente job
      - name: Upload Metrics Artifact
        uses: actions/upload-artifact@v6
        with:
          name: latest-metrics
          path: latest_metrics.json

  deploy-pages:
    needs: train-and-evaluate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Download Metrics Artifact
        uses: actions/download-artifact@v5
        with:
          name: latest-metrics

      - name: Update History and Generate HTML
        run: python scripts/update_history.py

      - name: Commit history.json to repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update model history"
          git push origin main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v6
        with:
            path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5

