name: Model CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

# Permisos necesarios para hacer commit y desplegar en Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Definicion de los jobs
jobs:
  quality-and-testing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff ty pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Code Quality (Ruff Lint & Format)
        run: |
          ruff check .
          ruff format --check .

      - name: Type Checking (ty)
        run: ty check .

      - name: Unit Tests (pytest)
        run: PYTHONPATH=src pytest tests

  train-and-evaluate:
    needs: quality-and-testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv pip install -r pyproject.toml --system

      - name: Train Model
        run: |
          python -c "import sys; sys.path.append('src'); from revolutionary_mlops.ml import train; print(train())"

      - name: Evaluate Model (Accuracy, Precision, Recall >= 80%)
        run: python scripts/evaluate_model.py

      - name: Upload Metrics Artifact
        uses: actions/upload-artifact@v5
        with:
          name: latest-metrics
          path: latest_metrics.json

  deploy-pages:
    needs: train-and-evaluate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Download Metrics Artifact
        uses: actions/download-artifact@v5
        with:
          name: latest-metrics

      - name: Update History and Generate HTML
        run: python scripts/update_history.py

      - name: Commit history.json to repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update model history[skip ci]"
          git pull --rebase origin main
          git push origin main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v5
        with:
            path: 'public/'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5